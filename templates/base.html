<!DOCTYPE html>
<html lang="en">

<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<title>{% block title %}Student App{% endblock %}</title>
	<!-- Bootstrap CSS -->
	<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
	<!-- Google Font: Inter -->
	<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
	<!-- Icons -->
	<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
	<link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
	{% block head %}{% endblock %}
</head>

<body>
	{% if request.endpoint != 'login' %}
	<nav class="navbar navbar-expand-lg sticky-top mb-4">
		<div class="container container-main">
			<a class="navbar-brand d-flex align-items-center" href="/dashboard">
				<div class="stat-icon icon-blue me-2" style="width:40px;height:40px;font-size:1.2rem;">
					<i class="fa-solid fa-graduation-cap"></i>
				</div>
				<span class="fw-bold">EduTrack</span>
			</a>
			<button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navMenu"
				aria-controls="navMenu" aria-expanded="false" aria-label="Toggle navigation" style="border:none;">
				<i class="fa-solid fa-bars" style="color:var(--text-main);font-size:1.5rem;"></i>
			</button>
			<div class="collapse navbar-collapse" id="navMenu">
				<ul class="navbar-nav ms-auto align-items-center">
					<li class="nav-item">
						<a class="nav-link {% if request.endpoint == 'dashboard' %}active{% endif %}" href="/dashboard">
							<i class="fa-solid fa-chart-pie me-1"></i> Dashboard
						</a>
					</li>
					<li class="nav-item">
						<a class="nav-link {% if request.endpoint == 'assignments' %}active{% endif %}"
							href="/assignments">
							<i class="fa-solid fa-list-check me-1"></i> Assignments
						</a>
					</li>
					<li class="nav-item">
						<a class="nav-link {% if request.endpoint == 'subjects' %}active{% endif %}" href="/subjects">
							<i class="fa-solid fa-book me-1"></i> Subjects
						</a>
					</li>
					<li class="nav-item ms-lg-3 mt-2 mt-lg-0">
						<a class="btn btn-primary" href="/add-assignment">
							<i class="fa-solid fa-plus me-1"></i> New
						</a>
					</li>
				</ul>
			</div>
		</div>
	</nav>
	{% endif %}

	<main class="container-main">
		{% block content %}{% endblock %}
	</main>

	<!-- Bootstrap JS -->
	<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
	{% block scripts %}{% endblock %}
</body>

</html>
