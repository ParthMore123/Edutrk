{% extends "base.html" %}
{% block title %}Sign In | EduTrack{% endblock %}
{% block content %}
<div class="auth-wrapper">
	<div class="glass auth-card">
		<div class="text-center mb-4">
			<div class="stat-icon icon-blue mx-auto mb-3"
				style="width:64px;height:64px;font-size:2rem;box-shadow: 0 4px 12px rgba(99,102,241,0.3);">
				<i class="fa-solid fa-graduation-cap"></i>
			</div>
			<h2 class="fw-bold mb-1" style="color:var(--text-main);">EduTrack</h2>
			<p class="text-muted">Sign in to your account</p>
		</div>

		<form method="POST">
			<div class="mb-4">
				<label class="form-label" for="email">Email address</label>
				<input type="email" name="email" id="email" class="form-control" placeholder="student@example.com"
					required>
			</div>
			<div class="mb-4">
				<label class="form-label" for="password">Password</label>
				<input type="password" name="password" id="password" class="form-control" placeholder="••••••••"
					required>
			</div>
			<div class="d-flex justify-content-between align-items-center mb-4 pb-2">
				<div class="form-check">
					<input class="form-check-input" type="checkbox" id="remember" checked>
					<label class="form-check-label text-muted small" for="remember">
						Remember me
					</label>
				</div>
				<a href="#" class="text-primary text-decoration-none small fw-bold">Forgot password?</a>
			</div>
			<div class="d-grid mb-3">
				<button type="submit" class="btn btn-primary btn-lg"><i
						class="fa-solid fa-right-to-bracket me-2"></i>Sign In</button>
			</div>
			<div class="text-center">
				<p class="text-muted small mb-0">Don't have an account? <a href="#"
						class="text-primary fw-bold text-decoration-none">Sign up</a></p>
			</div>
		</form>
	</div>
</div>
{% endblock %}
